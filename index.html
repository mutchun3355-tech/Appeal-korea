<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APPEAL KOREA — 생산관리 시스템</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Pretendard:wght@300;400;500;600&display=swap');
:root{
  --bg0:#0e0f11;--bg1:#151619;--bg2:#1c1e22;--bg3:#23262b;--bg4:#2b2f35;
  --b:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);
  --t0:#f0f1f3;--t1:#b8bcc4;--t2:#6e737d;--t3:#45484f;
  --ac:#3d8f6e;--ac2:#2d6b52;--al:#4aaf87;
  --red:#c94040;--amb:#b87a2a;
  --mono:'DM Mono',monospace;--sans:'Pretendard',-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg0);color:var(--t0);font-family:var(--sans);font-size:13px;line-height:1.5}
button{cursor:pointer;font-family:var(--sans);font-size:13px}
input,select,textarea{font-family:var(--sans);font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
a{color:var(--al)}
.app{display:flex;height:100vh;overflow:hidden}

/* ── NAV ── */
.nav{width:218px;min-width:218px;background:var(--bg1);border-right:1px solid var(--b);display:flex;flex-direction:column}
.nav-hdr{padding:15px 14px 10px;border-bottom:1px solid var(--b)}
.nav-logo{font-size:10px;font-weight:600;letter-spacing:.12em;color:var(--t2);text-transform:uppercase;margin-bottom:3px}
.nav-title{font-size:14px;font-weight:600}
.nav-body{flex:1;overflow-y:auto;padding:8px 0}
.nsl{padding:6px 14px 3px;font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--t3);text-transform:uppercase}
.ni{display:flex;align-items:center;gap:7px;padding:6px 14px;cursor:pointer;color:var(--t1);border-left:2px solid transparent;transition:all .15s}
.ni:hover{background:var(--bg2);color:var(--t0)}
.ni.on{background:var(--bg2);color:var(--al);border-left-color:var(--ac);font-weight:500}
.nc{margin-left:auto;font-size:10px;background:var(--bg3);color:var(--t2);padding:1px 5px;border-radius:10px;font-family:var(--mono)}
.na{display:flex;align-items:center;gap:6px;padding:6px 14px;color:var(--t3);font-size:12px;cursor:pointer}
.na:hover{color:var(--al)}
.nav-foot{padding:10px 14px;border-top:1px solid var(--b);display:flex;flex-direction:column;gap:5px}
.sync{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--t3)}
.sdot.on{background:var(--al)}
.sdot.sy{background:var(--amb);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--bg1);border-bottom:1px solid var(--b);gap:12px;flex-shrink:0}
.bc{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t2)}
.bc .c{cursor:pointer}.bc .c:hover{color:var(--t0)}
.bc .sep{color:var(--t3)}.bc .cur{color:var(--t0);font-weight:500}
.ta{display:flex;gap:8px;align-items:center}
.content{flex:1;overflow:auto;padding:20px}

/* ── BUTTONS ── */
.btn{padding:6px 12px;border-radius:6px;border:1px solid var(--b2);background:var(--bg3);color:var(--t0);transition:all .15s}
.btn:hover{background:var(--bg4)}
.btn.p{background:var(--ac);border-color:var(--ac);color:#fff}
.btn.p:hover{background:var(--al)}
.btn.sm{padding:4px 9px;font-size:12px}
.btn.d{background:rgba(201,64,64,.12);border-color:rgba(201,64,64,.3);color:var(--red)}
.btn.d:hover{background:rgba(201,64,64,.22)}
.btn.g{background:none;border-color:transparent;color:var(--t1)}
.btn.g:hover{background:var(--bg3)}

/* ── STATS ── */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.sc{background:var(--bg2);border:1px solid var(--b);border-radius:8px;padding:14px 16px}
.sl{font-size:11px;color:var(--t2);margin-bottom:5px}
.sv{font-size:22px;font-weight:600;font-family:var(--mono)}

/* ── TOOLBAR ── */
.tb{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.tb input,.tb select{background:var(--bg2);border:1px solid var(--b);border-radius:6px;padding:6px 10px;color:var(--t0)}
.tb input:focus,.tb select:focus{outline:none;border-color:var(--ac)}
.tb select option{background:var(--bg2)}
.sbs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.sb{background:var(--bg2);border:1px solid var(--b);border-radius:5px;padding:4px 9px;font-size:11px;color:var(--t1)}
.sb:hover{color:var(--t0)}.sb.on{background:var(--bg3);border-color:var(--ac2);color:var(--al)}

/* ── TABLE ── */
.tw{background:var(--bg1);border:1px solid var(--b);border-radius:8px;overflow:auto}
table{border-collapse:collapse;white-space:nowrap}
table.fw{width:100%}
th{background:var(--bg2);padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--t2);letter-spacing:.05em;text-transform:uppercase;border-bottom:1px solid var(--b);position:sticky;top:0;z-index:2;cursor:pointer;user-select:none}
th:hover{color:var(--t0)}
th.dov{background:var(--bg3);outline:2px dashed var(--ac2)}
th.dg{opacity:.25}
td{padding:9px 12px;border-bottom:1px solid var(--b);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;max-width:200px}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2);cursor:pointer}
.slink{color:var(--al);font-weight:500;font-family:var(--mono);font-size:12px}

/* ── BADGES ── */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.bs{background:rgba(110,115,125,.2);color:#8f95a0}
.bq{background:rgba(47,111,168,.2);color:#6eaadd}
.bp{background:rgba(106,79,172,.2);color:#a893e0}
.bk{background:rgba(61,143,110,.2);color:#68c49a}
.bsh{background:rgba(184,122,42,.2);color:#d4a85a}
.bar{background:rgba(184,122,42,.25);color:#e0b870}
.bd{background:rgba(61,143,110,.25);color:#4aaf87}

/* ── PANEL ── */
.pov{display:none;position:fixed;inset:0;z-index:100}
.pov.open{display:flex}
.pbk{position:absolute;inset:0;background:rgba(0,0,0,.5)}
.panel{position:absolute;right:0;top:0;bottom:0;width:600px;min-width:340px;max-width:92vw;background:var(--bg1);border-left:1px solid var(--b);display:flex;flex-direction:column;z-index:1;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.pov.open .panel{transform:translateX(0)}
/* 리사이즈 핸들 */
.panel-resize{position:absolute;left:-4px;top:0;bottom:0;width:8px;cursor:col-resize;z-index:10;display:flex;align-items:center;justify-content:center}
.panel-resize::after{content:'';width:3px;height:40px;background:var(--b2);border-radius:3px;transition:background .15s}
.panel-resize:hover::after,.panel-resize.dragging::after{background:var(--ac);width:4px}
.phdr{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--b);flex-shrink:0}
.phdr h2{font-size:15px;font-weight:600;flex:1;font-family:var(--mono)}
.ptabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--b);flex-shrink:0;overflow-x:auto}
.ptab{flex:none;padding:8px 11px;font-size:12px;border:none;background:none;color:var(--t2);border-bottom:2px solid transparent;white-space:nowrap}
.ptab:hover{color:var(--t0)}
.ptab.on{color:var(--al);border-bottom-color:var(--ac);background:var(--bg1);font-weight:500}
.pbody{flex:1;overflow-y:auto}
.ps{padding:14px 16px;border-bottom:1px solid var(--b)}
.psh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ps h3{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--t3);text-transform:uppercase}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.f{display:flex;flex-direction:column;gap:4px}
.f label{font-size:11px;color:var(--t2)}
.f input,.f select,.f textarea{background:var(--bg2);border:1px solid var(--b);border-radius:6px;padding:6px 9px;color:var(--t0);transition:border-color .15s}
.f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:var(--ac)}
.f select option{background:var(--bg2)}
.f textarea{resize:vertical;min-height:58px}
.ff{grid-column:span 2}
.pfooter{padding:12px 16px;border-top:1px solid var(--b);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}

/* ── CUSTOM FIELDS ── */
.cfr{display:flex;flex-direction:column;gap:6px;padding:10px 12px;background:var(--bg2);border:1px solid var(--b);border-radius:8px;margin-bottom:8px;position:relative}
.cfr-title-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.cfr-title{flex:1;font-size:12px;font-weight:600;color:var(--t0);background:none;border:none;border-bottom:1px solid var(--b);padding:3px 0;font-family:var(--sans)}
.cfr-title:focus{outline:none;border-bottom-color:var(--ac)}
.cfr-title::placeholder{color:var(--t3)}
.cfr-val{background:var(--bg1)!important;border:1px solid var(--b)!important;border-radius:5px;padding:7px 9px!important;color:var(--t0);width:100%;font-size:13px;font-family:var(--sans)}
.cfr-val:focus{outline:none!important;border-color:var(--ac)!important}
.cfr .dx{position:absolute;top:8px;right:8px;color:var(--t3);background:none;border:none;font-size:16px;padding:2px 5px;line-height:1;border-radius:4px}
.cfr .dx:hover{color:var(--red);background:rgba(201,64,64,.1)}

/* ── PHOTOS ── */
.uz{border:1px dashed var(--b2);border-radius:8px;padding:14px;text-align:center;cursor:pointer;transition:all .15s}
.uz:hover{border-color:var(--ac2);background:rgba(61,143,110,.05)}
.uzt{font-size:12px;color:var(--t2)}
.pgr{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.ptw{position:relative;aspect-ratio:1}
.pth{width:100%;height:100%;object-fit:cover;border-radius:6px;border:1px solid var(--b)}
.pdel{position:absolute;top:3px;right:3px;width:18px;height:18px;background:rgba(0,0,0,.75);border:none;border-radius:50%;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.wothumb{width:100%;border-radius:6px;border:1px solid var(--b);margin-top:6px;display:block}

/* ── MODAL ── */
.mov{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.mov.open{display:flex}
.modal{background:var(--bg1);border:1px solid var(--b);border-radius:10px;max-width:100%}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--b)}
.mhdr h2{font-size:14px;font-weight:600;font-family:var(--mono)}
.mbody{padding:16px 18px}
.mfoot{padding:12px 18px;border-top:1px solid var(--b);display:flex;justify-content:flex-end;gap:8px}

/* ── QC BLOCKS ── */
.qcbl{border:1px solid var(--b);border-radius:8px;margin-bottom:12px;overflow:hidden}
.qcbh{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);cursor:pointer}
.qcbh:hover{background:var(--bg3)}
.qcbt{font-size:13px;font-weight:500;flex:1}
.qcbb{padding:14px;display:none}
.qcbb.open{display:block}
.qcpg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.qcpc{aspect-ratio:1;background:var(--bg2);border:1px solid var(--b);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--t3);cursor:pointer;overflow:hidden}
.qcpc:hover{border-color:var(--ac2)}
.qcpc img{width:100%;height:100%;object-fit:cover}

/* ── PRODUCTION SPREADSHEET ── */
.plw{overflow:auto;border:1px solid var(--b);border-radius:8px;margin-top:8px}
.plt{border-collapse:collapse;font-size:12px;min-width:100%}
.plt th{background:var(--bg3);padding:6px 8px;border:1px solid var(--b);font-size:11px;font-weight:500;color:var(--t2);text-align:center;min-width:75px;white-space:nowrap}
.plt td{border:1px solid var(--b);padding:0;min-width:75px}
.plt td input{width:100%;height:100%;padding:5px 7px;background:transparent;border:none;color:var(--t0);font-family:var(--mono);font-size:12px}
.plt td input:focus{outline:none;background:rgba(61,143,110,.08)}
.plt td.sum{background:rgba(61,143,110,.1);text-align:right;padding:5px 8px;color:var(--al);font-family:var(--mono);font-size:12px;font-weight:500}
.plt th input{background:none;border:none;color:var(--t2);font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;width:100%;text-align:center}
.rn{width:26px;min-width:26px;background:var(--bg3);text-align:center;font-size:10px;color:var(--t3);padding:5px 3px;border:1px solid var(--b);user-select:none}

/* ── BOARD ── */
.bw{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px}
.bcol{min-width:185px;background:var(--bg2);border:1px solid var(--b);border-radius:8px;padding:10px;flex-shrink:0}
.bch{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.bcc{font-size:11px;background:var(--bg3);color:var(--t2);padding:1px 6px;border-radius:10px;font-family:var(--mono)}
.bcard{background:var(--bg1);border:1px solid var(--b);border-radius:6px;padding:9px 11px;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
.bcard:hover{border-color:var(--ac2)}
.bcst{font-size:12px;font-weight:600;color:var(--al);font-family:var(--mono);margin-bottom:3px}
.bcin{font-size:11px;color:var(--t2)}

/* ── FACTORY ── */
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.fcard{background:var(--bg2);border:1px solid var(--b);border-radius:8px;padding:14px 16px;cursor:pointer;transition:border-color .15s}
.fcard:hover{border-color:var(--b2)}
.fr{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--b)}
.fr:last-child{border-bottom:none}
.frl{color:var(--t2)}

/* ── HOME ── */
.hgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.hcard{background:var(--bg2);border:1px solid var(--b);border-radius:8px;padding:18px;cursor:pointer;transition:all .15s}
.hcard:hover{border-color:var(--b2);background:var(--bg3)}
.hcn{font-size:13px;font-weight:600;margin-bottom:3px}
.hcm{font-size:11px;color:var(--t2)}
.hadd{border-style:dashed;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:110px;color:var(--t3)}
.hadd:hover{border-color:var(--ac2);color:var(--al)}

/* ── CTX MENU ── */
.ctx{position:fixed;background:var(--bg3);border:1px solid var(--b2);border-radius:7px;padding:4px;z-index:500;min-width:155px;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none}
.ctxi{padding:7px 12px;font-size:12px;color:var(--t1);cursor:pointer;border-radius:4px}
.ctxi:hover{background:var(--bg4);color:var(--t0)}
.ctxs{height:1px;background:var(--b);margin:4px 0}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--b2);border-radius:8px;padding:10px 18px;font-size:13px;color:var(--t0);opacity:0;transition:all .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── MISC ── */
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;background:var(--bg3);color:var(--t2);border:1px solid var(--b)}
.mgri{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--b)}
.mgri input{flex:1;background:var(--bg2);border:1px solid var(--b);border-radius:5px;padding:5px 8px;color:var(--t0)}

/* ── PROD SPREADSHEET EXTRAS ── */
.pcel{position:relative}
.pcel:focus-within{outline:2px solid var(--al);outline-offset:-1px;z-index:1}
.pdrag{background:rgba(61,143,110,.18)!important;outline:1px solid var(--ac)!important}
.plt td.perr{background:rgba(201,64,64,.08)}
.plt td.perr input{color:var(--red)!important}
.plch{cursor:context-menu}
.plt thead th .col-letter{font-size:10px;color:var(--al);font-family:var(--mono);font-weight:700;display:block;text-align:center;margin-bottom:1px}
</style>
</head>
<body>
<div class="app">
  <div class="nav">
    <div class="nav-hdr">
      <div class="nav-logo">Appeal Korea</div>
      <div class="nav-title">생산관리 시스템</div>
    </div>
    <div class="nav-body" id="navBody"></div>
    <div class="nav-foot">
      <div class="sync"><div class="sdot" id="sdot"></div><span id="slbl">로컬 저장</span></div>
      <button class="btn sm g" onclick="openMgr()" style="width:100%;font-size:11px;margin-top:2px">⚙ 실장님 관리</button>
      <button class="btn sm g" onclick="openFBM()" style="width:100%;font-size:11px">☁ Firebase 설정</button>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="bc" id="bc"></div>
      <div class="ta" id="ta"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- ── STYLE PANEL ── -->
<div class="pov" id="pov">
  <div class="pbk" onclick="closePanel()"></div>
  <div class="panel" id="panel">
    <div class="panel-resize" id="panel-resize" title="드래그해서 크기 조절"></div>
    <div class="phdr"><h2 id="ptitle">—</h2><button class="btn sm g" onclick="closePanel()">✕</button></div>
    <div class="ptabs">
      <button class="ptab on" onclick="goTab(this,'info')">기본정보</button>
      <button class="ptab" onclick="goTab(this,'photos')">사진</button>
      <button class="ptab" onclick="goTab(this,'yarn')">원사</button>
      <button class="ptab" onclick="goTab(this,'pay')">결제</button>
      <button class="ptab" onclick="goTab(this,'qct')">QC</button>
      <button class="ptab" onclick="goTab(this,'prod')">생산현황</button>
      <button class="ptab" onclick="goTab(this,'etc')">기타</button>
    </div>
    <div class="pbody" id="pbody"></div>
    <div class="pfooter">
      <button class="btn d sm" onclick="delStyle()">삭제</button>
      <button class="btn sm" onclick="closePanel()">닫기</button>
      <button class="btn p sm" onclick="saveStyle()">저장</button>
    </div>
  </div>
</div>

<!-- ── QC MODAL ── -->
<div class="mov" id="qcm">
  <div class="modal" style="width:740px">
    <div class="mhdr"><h2 id="qcmt">QC</h2><button class="btn sm g" onclick="cm('qcm')">✕</button></div>
    <div class="mbody" id="qcmb"></div>
    <div class="mfoot">
      <button class="btn sm" onclick="addQCR()">+ 차수 추가</button>
      <button class="btn sm" onclick="cm('qcm')">닫기</button>
      <button class="btn p sm" onclick="saveQC()">저장</button>
    </div>
  </div>
</div>

<!-- ── MANAGER MODAL ── -->
<div class="mov" id="mgrm">
  <div class="modal" style="width:360px">
    <div class="mhdr"><h2>실장님 관리</h2><button class="btn sm g" onclick="cm('mgrm')">✕</button></div>
    <div class="mbody"><div id="mgrl"></div><button class="btn sm" style="margin-top:8px" onclick="addMgr()">+ 추가</button></div>
    <div class="mfoot"><button class="btn p sm" onclick="saveMgr()">저장</button></div>
  </div>
</div>

<!-- ── SEASON MODAL ── -->
<div class="mov" id="seasm">
  <div class="modal" style="width:340px">
    <div class="mhdr"><h2>새 시즌 추가</h2><button class="btn sm g" onclick="cm('seasm')">✕</button></div>
    <div class="mbody" style="display:flex;flex-direction:column;gap:12px">

<script>
// ══════════════════════════
// DATA
// ══════════════════════════
const LKEY = 'ak_v3';
const SL = ['샘플','QC 진행','QC 완료','PP 진행','PP 완료','수납 진행','수납 완료','선적진행','선적완료','입고예정','입고완료'];
const SC = {'샘플':'bs','QC 진행':'bq','QC 완료':'bq','PP 진행':'bp','PP 완료':'bp','수납 진행':'bk','수납 완료':'bk','선적진행':'bsh','선적완료':'bsh','입고예정':'bar','입고완료':'bd'};
const DCOLS = [
  {k:'style',l:'STYLE NO.',w:130},{k:'brand',l:'브랜드',w:85},{k:'factory',l:'공장',w:95},
  {k:'qty',l:'수량',w:68},{k:'cmt',l:'CMT ($)',w:78},{k:'fob',l:'FOB ($)',w:78},
  {k:'deadline',l:'마감일',w:88},{k:'status',l:'진행 상태',w:90},{k:'manager',l:'실장님',w:90},{k:'updated',l:'업데이트',w:83}
];

function mkS(id){
  return{id,style:'',brand:'',factory:'',qty:0,cmt:0,fob:0,deadline:'',status:'샘플',manager:'',note:'',
    photos:[],wop:[],ci:[],cm2:[],
    qc:[{t:'1차 QC',c:'',p:[]}],
    yords:[],files:[],tasks:[],
    prod:{cols:[{id:'c0',l:'날짜'},{id:'c1',l:'편직기'},{id:'c2',l:'생산량'},{id:'c3',l:'누계'},{id:'c4',l:'비고'}],
          rows:[['','','','',''],['','','','',''],['','','','','']]},
    updated:td()};
}
function td(){return new Date().toISOString().slice(0,10);}

let DB = null;
function ldb(){
  try{DB=JSON.parse(localStorage.getItem(LKEY))||null;}catch{}
  if(!DB) DB={
    managers:['박소라 실장님','이수연 실장님'],
    factories:[
      {id:'f1',name:'화성텍스',eng:'HWASUNG TEX',country:'중국',port:'청도',addr:'중국 산동성 청도시',tel:'86-532-0001',liaison:'왕웨이'},
      {id:'f2',name:'동흥니트',eng:'DONGHEUNG KNIT',country:'중국',port:'상해',addr:'중국 강소성 상해시',tel:'86-21-0002',liaison:'리민'},
    ],
    seasons:[{id:'25FW',name:'25FW',desc:'2025 FW',icon:'🍂'},{id:'26FW',name:'26FW',desc:'2026 FW',icon:'🍂'}],
    styles:{
      '25FW':[Object.assign(mkS('s1'),{style:'M5421PKT43',brand:'MALBON',factory:'f1',qty:500,cmt:18,fob:25.1,deadline:'2025-10-01',status:'입고완료',manager:'이수연 실장님',updated:'2025-10-23'})],
      '26FW':[
        Object.assign(mkS('s2'),{style:'AP26FW-K001',brand:'APPEAL',factory:'f1',qty:600,cmt:20,fob:28,deadline:'2026-10-01',status:'샘플',manager:'박소라 실장님',updated:'2026-04-01'}),
        Object.assign(mkS('s3'),{style:'AP26FW-K002',brand:'APPEAL',factory:'f2',qty:400,cmt:16,fob:22,deadline:'2026-10-15',status:'QC 진행',manager:'이수연 실장님',updated:'2026-04-10'}),
      ],
    },
    payments:[{id:'p1',season:'25FW',title:'M5421PKT43 1차',factory:'f1',styleId:'s1',price:12.55,qty:500,date:'2025-06-01',note:'T/T 50%'}],
    incoming:[],
    cols:JSON.parse(JSON.stringify(DCOLS)),
    fb:{url:'',k:'',pid:''},
  };
  // migration
  if(!DB.cols) DB.cols=JSON.parse(JSON.stringify(DCOLS));
  Object.values(DB.styles).flat().forEach(s=>{
    if(s.cmt===undefined)s.cmt=s.fob||0;
    if(!s.wop)s.wop=[];
    if(!s.ci)s.ci=[];
    if(!s.cm2)s.cm2=[];
    if(!s.prod)s.prod={cols:[{id:'c0',l:'날짜'},{id:'c1',l:'편직기'},{id:'c2',l:'생산량'},{id:'c3',l:'누계'},{id:'c4',l:'비고'}],rows:[['','','','',''],['','','','',''],['','','','','']]};
  });
}
function sdb(){localStorage.setItem(LKEY,JSON.stringify(DB));fbPush();}

// ══════════════════════════
// FIREBASE
// ══════════════════════════
let fbRef=null,fbOk=false;
function openFBM(){
  document.getElementById('fbu').value=DB.fb?.url||'';
  document.getElementById('fbk').value=DB.fb?.k||'';
  document.getElementById('fbpid').value=DB.fb?.pid||'';
  document.getElementById('fbst').textContent=fbOk?'✅ 현재 연결됨':'연결 안됨';
  om('fbm');
}
function connFB(){
  const url=document.getElementById('fbu').value.trim(),k=document.getElementById('fbk').value.trim(),pid=document.getElementById('fbpid').value.trim();
  if(!url||!k||!pid){alert('모두 입력하세요');return;}
  DB.fb={url,k,pid};sdb();iFB(url,k,pid);document.getElementById('fbst').textContent='연결 중...';
}
function discFB(){DB.fb={url:'',k:'',pid:''};fbOk=false;fbRef=null;syncUI(false);sdb();cm('fbm');toast('연결 해제됨');}
function iFB(url,k,pid){
  const ld=(src,cb)=>{if(document.querySelector(`script[src="${src}"]`)){cb();return;}const s=document.createElement('script');s.src=src;s.onload=cb;document.head.appendChild(s);};
  ld('https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-app-compat.min.js',()=>{
    ld('https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-database-compat.min.js',()=>_fb(url,k,pid));
  });
}
function _fb(url,k,pid){
  try{
    if(!firebase.apps.length)firebase.initializeApp({apiKey:k,databaseURL:url,projectId:pid});
    fbRef=firebase.database().ref('ak');
    fbRef.on('value',snap=>{
      const v=snap.val();
      if(v){const r=JSON.parse(v);['styles','payments','incoming','factories','seasons','managers','cols'].forEach(ky=>{if(r[ky])DB[ky]=r[ky];});localStorage.setItem(LKEY,JSON.stringify(DB));renderNav();renderContent();}
      fbOk=true;syncUI(true);document.getElementById('fbst').textContent='✅ 연결 성공!';cm('fbm');toast('Firebase 연결 완료!');
    });
  }catch(e){document.getElementById('fbst').textContent='❌ 실패: '+e.message;}
}
function fbPush(){if(!fbRef||!fbOk)return;setSy(true);fbRef.set(JSON.stringify(DB)).then(()=>setSy(false)).catch(()=>setSy(false));}
function syncUI(on){const d=document.getElementById('sdot');d.className='sdot'+(on?' on':'');document.getElementById('slbl').textContent=on?'실시간 동기화':'로컬 저장';}
function setSy(v){document.getElementById('sdot').className='sdot'+(v?' sy':fbOk?' on':'');}

// ══════════════════════════
// ROUTER
// ══════════════════════════
let view='home',season=null,sk='style',sd=1;
let pSeas=null,pSid=null,pTab='info';
let efid=null,dgSrc=null,qcN=4;

function nav(v,s=null){view=v;season=s;renderNav();renderBC();renderTA();renderContent();}

function renderNav(){
  let h=`<div class="nsl">홈</div><div class="ni ${view==='home'?'on':''}" onclick="nav('home')">🏠 APPEAL KOREA MAIN</div><div class="nsl" style="margin-top:8px">시즌</div>`;
  DB.seasons.forEach(s=>{const c=(DB.styles[s.id]||[]).length;
    h+=`<div class="ni ${season===s.id&&view==='season'?'on':''}" onclick="nav('season','${s.id}')">${s.icon} ${s.name}<span class="nc">${c}</span></div>`;});
  h+=`<div class="na" onclick="om('seasm')">+ 시즌 추가</div>
    <div class="nsl" style="margin-top:8px">관리</div>
    <div class="ni ${view==='factories'?'on':''}" onclick="nav('factories')">🏭 공장 정보<span class="nc">${DB.factories.length}</span></div>
    <div class="ni ${view==='payments'?'on':''}" onclick="nav('payments')">💳 결제 현황</div>
    <div class="ni ${view==='incoming'?'on':''}" onclick="nav('incoming')">📦 주간 입고 계획</div>`;
  document.getElementById('navBody').innerHTML=h;
}
function renderBC(){
  let h=`<span class="c" onclick="nav('home')">APPEAL KOREA</span>`;
  if(view==='season'&&season)h+=`<span class="sep">›</span><span class="cur">${season}</span>`;
  else if(view==='factories')h+=`<span class="sep">›</span><span class="cur">공장 정보</span>`;
  else if(view==='payments')h+=`<span class="sep">›</span><span class="cur">결제 현황</span>`;
  else if(view==='incoming')h+=`<span class="sep">›</span><span class="cur">주간 입고 계획</span>`;
  document.getElementById('bc').innerHTML=h;
}
function renderTA(){
  let h='';
  if(view==='season')h=`<button class="btn sm" onclick="om('xlm')">📥 엑셀</button><button class="btn p sm" onclick="openNSM()">+ 스타일 등록</button>`;
  else if(view==='factories')h=`<button class="btn p sm" onclick="openFactM()">+ 공장 추가</button>`;
  else if(view==='payments')h=`<button class="btn sm" onclick="om('xlm')">📥 엑셀</button><button class="btn p sm" onclick="addPay()">+ 결제 추가</button>`;
  else h=`<button class="btn sm" onclick="om('xlm')">📥 엑셀</button>`;
  document.getElementById('ta').innerHTML=h;
}
function renderContent(){
  const el=document.getElementById('content');
  if(view==='home') el.innerHTML=renderHome();
  else if(view==='season') el.innerHTML=renderSeason();
  else if(view==='factories') el.innerHTML=renderFactories();
  else if(view==='payments') el.innerHTML=renderPayments();
  else if(view==='incoming') el.innerHTML=renderIncoming();
}

// ══════════════════════════
// HOME
// ══════════════════════════
function renderHome(){
  const tot=Object.values(DB.styles).reduce((a,v)=>a+v.length,0);
  const tCMT=Object.values(DB.styles).flat().reduce((a,s)=>a+(s.qty||0)*(s.cmt||0),0);
  const cards=DB.seasons.map(s=>{
    const c=(DB.styles[s.id]||[]).length,cmt=(DB.styles[s.id]||[]).reduce((a,x)=>a+(x.qty||0)*(x.cmt||0),0);
    return`<div class="hcard" onclick="nav('season','${s.id}')"><div style="font-size:26px;margin-bottom:10px">${s.icon}</div><div class="hcn">${s.name}</div><div class="hcm">${c}개 스타일 · CMT $${Math.round(cmt).toLocaleString()}</div></div>`;
  }).join('');
  return`<div style="margin-bottom:20px"><div style="font-size:20px;font-weight:700;margin-bottom:4px">APPEAL KOREA MAIN</div><div style="font-size:13px;color:var(--t2)">${tot}개 스타일 · ${DB.seasons.length}개 시즌</div></div>
  <div class="sg">
    <div class="sc"><div class="sl">전체 스타일</div><div class="sv">${tot}</div></div>
    <div class="sc"><div class="sl">시즌 수</div><div class="sv">${DB.seasons.length}</div></div>
    <div class="sc"><div class="sl">총 CMT 금액</div><div class="sv" style="font-size:16px">$${Math.round(tCMT).toLocaleString()}</div></div>
    <div class="sc"><div class="sl">등록 공장</div><div class="sv">${DB.factories.length}</div></div>
  </div>
  <div style="font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--t3);text-transform:uppercase;margin-bottom:10px">폴더</div>
  <div class="hgrid">${cards}
    <div class="hcard" onclick="nav('factories')"><div style="font-size:26px;margin-bottom:10px">🏭</div><div class="hcn">공장 정보</div><div class="hcm">${DB.factories.length}개</div></div>
    <div class="hcard" onclick="nav('payments')"><div style="font-size:26px;margin-bottom:10px">💳</div><div class="hcn">결제 현황</div><div class="hcm">${DB.payments.length}건</div></div>
    <div class="hcard" onclick="nav('incoming')"><div style="font-size:26px;margin-bottom:10px">📦</div><div class="hcn">주간 입고 계획</div></div>
    <div class="hcard hadd" onclick="om('seasm')"><div style="font-size:28px;margin-bottom:8px">+</div><div>새 시즌 추가</div></div>
  </div>`;
}

// ══════════════════════════
// SEASON VIEW
// ══════════════════════════
function renderSeason(){
  const all=DB.styles[season]||[];
  const q=document.getElementById('sq')?.value?.toLowerCase()||'';
  const fs=document.getElementById('sfs')?.value||'';
  const fb=document.getElementById('sfb')?.value||'';
  const fm=document.getElementById('sfm')?.value||'';
  const vw=document.getElementById('svw')?.value||'table';
  const fn=id=>(DB.factories.find(f=>f.id===id)||{name:'-'}).name;

  let rows=all.filter(s=>{
    if(q&&!(s.style||'').toLowerCase().includes(q)&&!(s.brand||'').toLowerCase().includes(q))return false;
    if(fs&&s.status!==fs)return false;
    if(fb&&s.brand!==fb)return false;
    if(fm&&!(s.manager||'').includes(fm))return false;
    return true;
  }).sort((a,b)=>{let av=a[sk]||'',bv=b[sk]||'';if(['qty','cmt','fob'].includes(sk)){av=+av||0;bv=+bv||0;}return av<bv?-sd:av>bv?sd:0;});

  const tQ=all.reduce((a,s)=>a+(s.qty||0),0);
  const tCMT=all.reduce((a,s)=>a+(s.qty||0)*(s.cmt||0),0);
  const done=all.filter(s=>s.status==='입고완료').length;
  const brands=[...new Set(all.map(s=>s.brand).filter(Boolean))];
  const mgrs=[...new Set(all.map(s=>s.manager).filter(Boolean))];

  const sbts=[{k:'style',l:'STYLE NO.'},{k:'brand',l:'브랜드'},{k:'factory',l:'공장'},{k:'status',l:'진행 상태'},{k:'manager',l:'실장님'},{k:'deadline',l:'마감일'},{k:'qty',l:'수량'},{k:'cmt',l:'CMT'}]
    .map(c=>`<button class="sb ${sk===c.k?'on':''}" onclick="setSt('${c.k}')">${c.l}${sk===c.k?(sd===1?' ↑':' ↓'):''}</button>`).join('');

  let main='';
  if(vw==='board'){
    const gp={};SL.forEach(s=>gp[s]=[]);rows.forEach(s=>{if(gp[s.status])gp[s.status].push(s);});
    main=`<div class="bw">${SL.filter(s=>gp[s].length>0).map(s=>`<div class="bcol">
      <div class="bch"><span class="badge ${SC[s]||'bs'}">${s}</span><span class="bcc">${gp[s].length}</span></div>
      ${gp[s].map(i=>`<div class="bcard" onclick="openPanel('${season}','${i.id}')"><div class="bcst">${i.style}</div><div class="bcin">${i.brand||'-'} · ${(i.qty||0).toLocaleString()}장<br>${i.deadline||''}</div></div>`).join('')}
    </div>`).join('')}</div>`;
  } else {
    const vc=DB.cols;
    const ths=vc.map((c,i)=>`<th draggable="true"
      ondragstart="dgS(event,${i})" ondragover="dgOv(event,${i})" ondrop="dgDp(event,${i})" ondragend="dgE()"
      onclick="if(!window._dg)setSt('${c.k}')" style="min-width:${c.w||80}px;max-width:200px">

function colLetter(ci){
  let s='',n=ci+1;
  while(n>0){s=String.fromCharCode(65+(n-1)%26)+s;n=Math.floor((n-1)/26);}
  return s;
}

function esc(v){return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// 현재 선택 셀
let pSel={r:-1,c:-1};

// 드래그 범위 선택 (=SUM( 등 입력 후)
function pMouseDown(e,ri,ci){
  const fxEl=document.getElementById('pfx');
  const fx=fxEl?fxEl.value:'';
  const ref=colLetter(ci)+(ri+1);

  // 수식 입력 중 (= 로 시작) → 클릭으로 셀 참조 삽입
  if(fx.startsWith('=')&&pSel.r>=0){
    e.preventDefault();
    // 드래그 범위 지정 모드: =SUM( 처럼 함수 괄호 열린 상태
    if(fx.match(/=[A-Z]+\($/i)||fx.match(/=[A-Z]+\([^)]*,\s*$/i)){
      pDragSel={active:true,startR:ri,startC:ci,endR:ri,endC:ci,formulaTarget:{r:pSel.r,c:pSel.c}};
      pHighDrag();
      // 단일 셀 참조 미리 표시
      const base=fx.replace(/:?[A-Z]+\d+:[A-Z]+\d+\)?$/i,'').replace(/:?[A-Z]+\d+\)?$/i,'');
      fxEl.value=base+ref+')';
    } else {
      // 단순 수식 중 클릭: 커서 위치에 셀 참조 삽입
      const inp=pSel.r>=0?document.querySelector('#pr-'+pSel.r+' td[data-c="'+pSel.c+'"] input'):null;
      if(inp){
        const pos=inp.selectionStart;
        const cur=inp.value;
        // 마지막 셀 참조 교체 or 끝에 추가
        const newVal=cur.replace(/[A-Z]+\d+(:[A-Z]+\d+)?$/i,'')+ref;
        inp.value=newVal;
        fxEl.value=newVal;
        pCI(pSel.r,pSel.c,inp);
      }
    }
    return;
  }
  pSel={r:ri,c:ci};pHighlight();
}
function pMouseOver(e,ri,ci){
  if(!pDragSel.active)return;
  pDragSel.endR=ri;pDragSel.endC=ci;pHighDrag();
  // 수식바 업데이트
  const r1=Math.min(pDragSel.startR,pDragSel.endR),r2=Math.max(pDragSel.startR,pDragSel.endR);
  const c1=Math.min(pDragSel.startC,pDragSel.endC),c2=Math.max(pDragSel.startC,pDragSel.endC);
  const ref=colLetter(c1)+(r1+1)+':'+colLetter(c2)+(r2+1);
  const baseFx=document.getElementById('pfx').value.replace(/:?[A-Z]+\d+:[A-Z]+\d+\)?$/i,'').replace(/:?[A-Z]+\d+\)?$/i,'');
  const newFx=baseFx+ref+')';
  document.getElementById('pfx').value=newFx;
}
function pMouseUp(e){
  if(!pDragSel.active)return;
  pDragSel.active=false;
  // 드래그 완료 → 수식 확정
  const fx=document.getElementById('pfx').value;
  const {r,c}=pDragSel.formulaTarget;
  const inp=document.querySelector(`#pr-${r} td[data-c="${c}"] input`);
  if(inp){inp.value=fx;pCI(r,c,inp);}
  document.querySelectorAll('.pdrag').forEach(td=>td.classList.remove('pdrag'));
}
function pHighDrag(){
  document.querySelectorAll('.pdrag').forEach(td=>td.classList.remove('pdrag'));
  const r1=Math.min(pDragSel.startR,pDragSel.endR),r2=Math.max(pDragSel.startR,pDragSel.endR);
  const c1=Math.min(pDragSel.startC,pDragSel.endC),c2=Math.max(pDragSel.startC,pDragSel.endC);
  document.querySelectorAll('.pcel').forEach(td=>{
    const r=+td.dataset.r,c=+td.dataset.c;
    if(r>=r1&&r<=r2&&c>=c1&&c<=c2)td.classList.add('pdrag');
  });
}

// 키보드 이동
function pKey(e,ri,ci){
  const s=gS(pSeas,pSid);const rows=s.prod.rows.length;const cols=s.prod.cols.length;
  if(e.key==='Enter'||e.key==='ArrowDown'){e.preventDefault();pMoveTo(Math.min(ri+1,rows-1),ci);}
  else if(e.key==='ArrowUp'){e.preventDefault();pMoveTo(Math.max(ri-1,0),ci);}
  else if(e.key==='Tab'){e.preventDefault();pMoveTo(ri,Math.min(ci+1,cols-1));}
  else if(e.key==='ArrowLeft'&&e.currentTarget.selectionStart===0){e.preventDefault();pMoveTo(ri,Math.max(ci-1,0));}
  else if(e.key==='ArrowRight'&&e.currentTarget.selectionStart===e.currentTarget.value.length){e.preventDefault();pMoveTo(ri,Math.min(ci+1,cols-1));}
}
function pMoveTo(ri,ci){
  // sum 셀이면 pSelF, 아니면 input focus
  const td=document.querySelector(`#pr-${ri} td[data-c="${ci}"]`);
  if(!td)return;
  if(td.classList.contains('sum')){pSelF(ri,ci);}
  else{const inp=td.querySelector('input');if(inp)inp.focus();}
}

function evF(expr,ri,ci,p){
  try{
    const rows=p.rows;
    // 셀 참조 → 숫자 변환
    const getCell=ref=>{
      const m=ref.trim().match(/^([A-Z]+)(\d+)$/i);if(!m)return null;
      const r=+m[2]-1,c=m[1].toUpperCase().charCodeAt(0)-65;
      const raw=((rows[r]||[])[c]||'').toString();
      if(raw.startsWith('='))return parseFloat(evF(raw,r,c,p))||0;
      return parseFloat(raw)||0;
    };
    const pRng=(a2,b2)=>{
      const sa=getCell(a2+' '),eb=getCell(b2+' ');
      const ma=a2.match(/^([A-Z]+)(\d+)$/i),mb=b2.match(/^([A-Z]+)(\d+)$/i);
      if(!ma||!mb)return[];const vs=[];
      const r1=+ma[2]-1,c1=ma[1].toUpperCase().charCodeAt(0)-65;
      const r2=+mb[2]-1,c2=mb[1].toUpperCase().charCodeAt(0)-65;
      for(let r=r1;r<=r2;r++)for(let c=c1;c<=c2;c++){
        const raw=((rows[r]||[])[c]||'').toString();
        const v=raw.startsWith('=')?parseFloat(evF(raw,r,c,p))||0:parseFloat(raw)||0;
        if(!isNaN(v))vs.push(v);
      }return vs;
    };
    const cl=expr.slice(1).trim().toUpperCase();

    // 함수형: SUM, AVERAGE, COUNT, MAX, MIN
    let m=cl.match(/^SUM\(([A-Z]+\d+):([A-Z]+\d+)\)$/);
    if(m){const vs=pRng(m[1],m[2]);const r=vs.reduce((a,b)=>a+b,0);return fmtNum(Number.isInteger(r)?r:+r.toFixed(4));}
    m=cl.match(/^AVERAGE\(([A-Z]+\d+):([A-Z]+\d+)\)$/);
    if(m){const vs=pRng(m[1],m[2]);if(!vs.length)return fmtNum(0);const r=vs.reduce((a,b)=>a+b,0)/vs.length;return fmtNum(+r.toFixed(4));}
    m=cl.match(/^COUNT\(([A-Z]+\d+):([A-Z]+\d+)\)$/);
    if(m){return fmtNum(pRng(m[1],m[2]).length);}
    m=cl.match(/^MAX\(([A-Z]+\d+):([A-Z]+\d+)\)$/);
    if(m){const vs=pRng(m[1],m[2]);return vs.length?fmtNum(Math.max(...vs)):fmtNum(0);}
    m=cl.match(/^MIN\(([A-Z]+\d+):([A-Z]+\d+)\)$/);
    if(m){const vs=pRng(m[1],m[2]);return vs.length?fmtNum(Math.min(...vs)):fmtNum(0);}

    // 일반 수식: A1+B2, A1-B2, A1*B2, A1/B2 등
    // 셀 참조를 숫자로 치환 후 eval
    let formula=cl.replace(/([A-Z]+\d+)/g,(ref)=>{
      const v=getCell(ref);return isNaN(v)?0:v;
    });
    // 안전한 문자만 허용: 숫자, 연산자, 괄호, 소수점, 공백
    if(!/^[\d+\-*/().\s]+$/.test(formula))return '#ERR';
    const result=Function('"use strict";return ('+formula+')')();
    if(!isFinite(result))return '#ERR';
    return fmtNum(Number.isInteger(result)?result:+result.toFixed(4));
  }catch{return '#ERR';}
}

// 숫자 포맷팅: 천단위 콤마 + 음수 빨간색
function fmtNum(v){
  const n=+v;
  if(isNaN(n))return v;
  const formatted=n.toLocaleString('ko-KR');
  if(n<0) return '<span style="color:var(--red);font-weight:500">'+formatted+'</span>';
  if(n>0) return '<span style="color:var(--al);font-weight:500">'+formatted+'</span>';
  return formatted;
}
// fmtNum을 evF 내부 반환에도 적용

function pCI(ri,ci,el){
  const s=gS(pSeas,pSid);
  while(s.prod.rows.length<=ri)s.prod.rows.push(new Array(s.prod.cols.length).fill(''));
  while((s.prod.rows[ri]||[]).length<=ci)s.prod.rows[ri].push('');
  s.prod.rows[ri][ci]=el.value;
  const fxEl=document.getElementById('pfx');if(fxEl)fxEl.value=el.value;
  sdb();
  reCalcProd(s.prod);
}
function reCalcProd(p){
  p.rows.forEach((row,ri)=>{
    (row||[]).forEach((v,ci)=>{
      if(!v||!v.toString().startsWith('='))return;
      const result=evF(v.toString(),ri,ci,p);
      const td=document.querySelector('#pr-'+ri+' td[data-c="'+ci+'"]');
      if(!td||td.querySelector('input'))return;
      if(result==='#ERR'){
        td.className='pcel perr';
        td.setAttribute('onclick','pSelF('+ri+','+ci+')');
        td.innerHTML='<span style="display:block;padding:5px 7px;color:var(--red)">#ERR (클릭하여 수정)</span>';
      } else {
        td.className='sum pcel';
        td.setAttribute('onclick','pSelF('+ri+','+ci+')');
        td.innerHTML='<span style="display:block;padding:5px 7px">'+result+'</span>';
      }
    });
  });
}

function pCB(ri,ci,el){
  const v=el.value;if(!v.startsWith('='))return;
  const s=gS(pSeas,pSid);s.prod.rows[ri][ci]=v;
  const result=evF(v,ri,ci,s.prod);
  const td=el.parentElement;
  if(result==='#ERR'){
    // 에러: input 유지, 빨간색으로 표시
    td.className='pcel perr';
    el.style.color='var(--red)';
    sdb();return;
  }
  // 정상: sum 셀로 변환
  td.className='sum pcel';td.setAttribute('data-raw',v);
  td.setAttribute('onclick',`pSelF(${ri},${ci})`);
  td.removeAttribute('onmousedown');td.removeAttribute('onmouseover');
  td.innerHTML=`<span style="display:block;padding:5px 7px">${result}</span>`;
  sdb();
}
function pUL(ci,v){const s=gS(pSeas,pSid);if(s.prod.cols[ci])s.prod.cols[ci].l=v;sdb();}
function pAC(){const s=gS(pSeas,pSid);s.prod.cols.push({id:'c'+Date.now(),l:'새 열'});s.prod.rows.forEach(r=>{while(r.length<s.prod.cols.length)r.push('');});sdb();rTab('prod');}
function pDC(){

}
function pAR(){const s=gS(pSeas,pSid);s.prod.rows.push(new Array(s.prod.cols.length).fill(''));sdb();rTab('prod');}
function pDR(){
  const s=gS(pSeas,pSid);if(s.prod.rows.length<=1){toast('행은 최소 1개 필요');return;}
  const ri=pSel.r>=0&&pSel.r<s.prod.rows.length?pSel.r:s.prod.rows.length-1;

function pHelp(){alert('[ 편직일보 함수 사용법 ]\n\n=SUM(B2:B10)   — 합계\n=AVERAGE(B2:B10) — 평균\n=COUNT(B2:B10)  — 숫자 개수\n=MAX(B2:B10)   — 최대값\n=MIN(B2:B10)   — 최소값\n\n[ 범위 지정 방법 ]\n① 셀 클릭 후 수식바에 =SUM( 입력\n② 원하는 범위를 마우스로 드래그\n③ 자동으로 범위가 채워짐\n\n[ 에러 수정 ]\n#ERR 표시 셀을 클릭하면 직접 수정 가능\n\n[ 이동 단축키 ]\nEnter / ↓ — 아래 이동\nTab — 오른쪽 이동\n← → ↑ — 방향키 이동');}

function pRC(e,ri){e.preventDefault();showCtx(e,[

  {l:`${ri+1}행 아래에 추가`,fn:()=>{const s=gS(pSeas,pSid);s.prod.rows.splice(ri+1,0,new Array(s.prod.cols.length).fill(''));sdb();rTab('prod');}},
  {l:`${ri+1}행 삭제`,fn:()=>{const s=gS(pSeas,pSid);if(s.prod.rows.length<2){toast('행은 최소 1개');return;}s.prod.rows.splice(ri,1);sdb();rTab('prod');}},
]);}
function showCtx(e,items){ctxFns=items;const m=document.getElementById('ctx');m.innerHTML=items.map((it,i)=>`<div class="ctxi" onclick="ctxFns[${i}].fn();hideCtx()">${it.l}</div>`).join('');m.style.display='block';m.style.left=e.clientX+'px';m.style.top=e.clientY+'px';}

// 현재 선택 (시트별)
let ySel={si:-1,r:-1,c:-1};
let yDrag={active:false,si:-1,startR:-1,startC:-1,endR:-1,endC:-1,target:null};

function yFocus(si,ri,ci,el){
  ySel={si,r:ri,c:ci};
  const ref=colLetter(ci)+(ri+1);
  const refEl=document.getElementById('yref'+si);if(refEl)refEl.textContent=ref;
  const s=gS(pSeas,pSid);
  const raw=((s.yarnSheets[si]?.rows[ri])||[])[ci]||'';
  const fxEl=document.getElementById('yfx'+si);if(fxEl)fxEl.value=raw;
  el.value=raw;
  yHighlight(si,ri,ci);
}
function yHighlight(si,ri,ci){
  document.querySelectorAll(`.pcel[data-si="${si}"]`).forEach(td=>{
    td.style.outline=(+td.dataset.r===ri&&+td.dataset.c===ci)?'2px solid var(--al)':'';
  });
}
function yfxInp(si,v){
  if(ySel.si!==si||ySel.r<0)return;
  const inp=document.querySelector(`#yr-${si}-${ySel.r} td[data-c="${ySel.c}"] input`);
  if(inp){inp.value=v;inp.dispatchEvent(new Event('input'));}
}
function yfxKey(e,si){
  if(e.key==='Enter'&&ySel.si===si&&ySel.r>=0){
    const inp=document.querySelector(`#yr-${si}-${ySel.r} td[data-c="${ySel.c}"] input`);
    if(inp)inp.blur();
  }
}
function ySelF(si,ri,ci){
  const s=gS(pSeas,pSid);
  const raw=((s.yarnSheets[si]?.rows[ri])||[])[ci]||'';
  const td=document.querySelector(`#yr-${si}-${ri} td[data-c="${ci}"]`);
  if(!td)return;
  td.className='pcel';td.removeAttribute('onclick');
  td.setAttribute('onmousedown',`yMD(event,${si},${ri},${ci})`);
  td.setAttribute('onmouseover',`yMO(event,${si},${ri},${ci})`);
  td.innerHTML=`<input type="text" value="${esc(raw)}"
    onfocus="yFocus(${si},${ri},${ci},this)" oninput="yCI(${si},${ri},${ci},this)"
    onblur="yCB(${si},${ri},${ci},this)" onkeydown="yKey(event,${si},${ri},${ci})"
    style="width:100%;padding:5px 7px;background:transparent;border:none;color:var(--t0);font-family:var(--mono);font-size:12px">`;
  const inp=td.querySelector('input');inp.focus();inp.select();
  ySel={si,r:ri,c:ci};
}
function yMD(e,si,ri,ci){
  const fxEl=document.getElementById('yfx'+si);
  const fx=fxEl?fxEl.value:'';
  const ref=colLetter(ci)+(ri+1);

  if(fx.startsWith('=')&&ySel.si===si&&ySel.r>=0){
    e.preventDefault();
    if(fx.match(/=[A-Z]+\($/i)||fx.match(/=[A-Z]+\([^)]*,\s*$/i)){
      yDrag={active:true,si,startR:ri,startC:ci,endR:ri,endC:ci,target:{r:ySel.r,c:ySel.c}};
      yHD(si);
      const base=fx.replace(/:?[A-Z]+\d+:[A-Z]+\d+\)?$/i,'').replace(/:?[A-Z]+\d+\)?$/i,'');
      if(fxEl)fxEl.value=base+ref+')';
    } else {
      const inp=document.querySelector('#yr-'+si+'-'+ySel.r+' td[data-c="'+ySel.c+'"] input');
      if(inp){
        const newVal=inp.value.replace(/[A-Z]+\d+(:[A-Z]+\d+)?$/i,'')+ref;
        inp.value=newVal;
        if(fxEl)fxEl.value=newVal;
        yCI(si,ySel.r,ySel.c,inp);
      }
    }
    return;
  }
}
function yMO(e,si,ri,ci){
  if(!yDrag.active||yDrag.si!==si)return;
  yDrag.endR=ri;yDrag.endC=ci;yHD(si);
  const r1=Math.min(yDrag.startR,yDrag.endR),r2=Math.max(yDrag.startR,yDrag.endR);
  const c1=Math.min(yDrag.startC,yDrag.endC),c2=Math.max(yDrag.startC,yDrag.endC);
  const ref=colLetter(c1)+(r1+1)+':'+colLetter(c2)+(r2+1);
  const fx=document.getElementById('yfx'+si);
  if(fx){const base=fx.value.replace(/:?[A-Z]+\d+:[A-Z]+\d+\)?$/i,'').replace(/:?[A-Z]+\d+\)?$/i,'');fx.value=base+ref+')';}
}
function yMU(e,si){
  if(!yDrag.active||yDrag.si!==si)return;
  yDrag.active=false;
  const fx=document.getElementById('yfx'+si)?.value||'';
  const {r,c}=yDrag.target;
  const inp=document.querySelector(`#yr-${si}-${r} td[data-c="${c}"] input`);
  if(inp){inp.value=fx;yCI(si,r,c,inp);}
  document.querySelectorAll('.pdrag').forEach(td=>td.classList.remove('pdrag'));
}
function yHD(si){
  document.querySelectorAll(`.pcel[data-si="${si}"]`).forEach(td=>td.classList.remove('pdrag'));
  const r1=Math.min(yDrag.startR,yDrag.endR),r2=Math.max(yDrag.startR,yDrag.endR);
  const c1=Math.min(yDrag.startC,yDrag.endC),c2=Math.max(yDrag.startC,yDrag.endC);
  document.querySelectorAll(`.pcel[data-si="${si}"]`).forEach(td=>{
    if(+td.dataset.r>=r1&&+td.dataset.r<=r2&&+td.dataset.c>=c1&&+td.dataset.c<=c2)td.classList.add('pdrag');
  });
}
function yKey(e,si,ri,ci){
  const s=gS(pSeas,pSid);const sh=s.yarnSheets[si];
  const rows=sh.rows.length,cols=sh.cols.length;
  if(e.key==='Enter'||e.key==='ArrowDown'){e.preventDefault();yMoveTo(si,Math.min(ri+1,rows-1),ci);}
  else if(e.key==='ArrowUp'){e.preventDefault();yMoveTo(si,Math.max(ri-1,0),ci);}
  else if(e.key==='Tab'){e.preventDefault();yMoveTo(si,ri,Math.min(ci+1,cols-1));}
}
function yMoveTo(si,ri,ci){
  const td=document.querySelector(`#yr-${si}-${ri} td[data-c="${ci}"]`);
  if(!td)return;
  if(td.classList.contains('sum')){ySelF(si,ri,ci);}
  else{const inp=td.querySelector('input');if(inp)inp.focus();}
}
function yCI(si,ri,ci,el){
  const s=gS(pSeas,pSid);const sh=s.yarnSheets[si];
  while(sh.rows.length<=ri)sh.rows.push(new Array(sh.cols.length).fill(''));
  while((sh.rows[ri]||[]).length<=ci)sh.rows[ri].push('');
  sh.rows[ri][ci]=el.value;
  const fx=document.getElementById('yfx'+si);if(fx&&ySel.si===si&&ySel.r===ri&&ySel.c===ci)fx.value=el.value;
  sdb();
  reCalcYarn(si,sh);
}
function reCalcYarn(si,sh){
  (sh.rows||[]).forEach((row,ri)=>{
    (row||[]).forEach((v,ci)=>{
      if(!v||!v.toString().startsWith('='))return;
      const result=evF(v.toString(),ri,ci,sh);
      const td=document.querySelector('#yr-'+si+'-'+ri+' td[data-c="'+ci+'"]');
      if(!td||td.querySelector('input'))return;
      if(result==='#ERR'){
        td.className='pcel perr';
        td.setAttribute('onclick','ySelF('+si+','+ri+','+ci+')');
        td.innerHTML='<span style="display:block;padding:5px 7px;color:var(--red)">#ERR (클릭하여 수정)</span>';
      } else {
        td.className='sum pcel';
        td.setAttribute('onclick','ySelF('+si+','+ri+','+ci+')');
        td.innerHTML='<span style="display:block;padding:5px 7px">'+result+'</span>';
      }
    });
  });
}

function yCB(si,ri,ci,el){
  const v=el.value;if(!v.startsWith('='))return;
  const s=gS(pSeas,pSid);const sh=s.yarnSheets[si];
  sh.rows[ri][ci]=v;
  const result=evF(v,ri,ci,sh);
  const td=el.parentElement;
  if(result==='#ERR'){td.className='pcel perr';el.style.color='var(--red)';sdb();return;}
  td.className='sum pcel';td.setAttribute('onclick',`ySelF(${si},${ri},${ci})`);
  td.removeAttribute('onmousedown');td.removeAttribute('onmouseover');
  td.innerHTML=`<span style="display:block;padding:5px 7px">${result}</span>`;
  sdb();
}
function yUL(si,ci,v){const s=gS(pSeas,pSid);if(s.yarnSheets[si]?.cols[ci])s.yarnSheets[si].cols[ci].l=v;sdb();}
function yAC(si){const s=gS(pSeas,pSid);const sh=s.yarnSheets[si];sh.cols.push({id:'yc'+Date.now(),l:'새 열'});sh.rows.forEach(r=>{while(r.length<sh.cols.length)r.push('');});sdb();rTab('yarn');}
function yDC(si){const s=gS(pSeas,pSid);const sh=s.yarnSheets[si];if(sh.cols.length<=1){toast('열은 최소 1개');return;}const ci=ySel.si===si&&ySel.c>=0&&ySel.c<sh.cols.length?ySel.c:sh.cols.length-1;sh.cols.splice(ci,1);sh.rows.forEach(r=>r.splice(ci,1));sdb();rTab('yarn');}
function yAR(si){const s=gS(pSeas,pSid);const sh=s.yarnSheets[si];sh.rows.push(new Array(sh.cols.length).fill(''));sdb();rTab('yarn');}
function yDR(si){const s=gS(pSeas,pSid);const sh=s.yarnSheets[si];if(sh.rows.length<=1){toast('행은 최소 1개');return;}const ri=ySel.si===si&&ySel.r>=0&&ySel.r<sh.rows.length?ySel.r:sh.rows.length-1;sh.rows.splice(ri,1);sdb();rTab('yarn');}
function yCC(e,si,ci){e.preventDefault();showCtx(e,[
  {l:`${colLetter(ci)}열 왼쪽에 추가`,fn:()=>{const s=gS(pSeas,pSid);const sh=s.yarnSheets[si];sh.cols.splice(ci,0,{id:'yc'+Date.now(),l:'새 열'});sh.rows.forEach(r=>r.splice(ci,0,''));sdb();rTab('yarn');}},
  {l:`${colLetter(ci)}열 오른쪽에 추가`,fn:()=>{const s=gS(pSeas,pSid);const sh=s.yarnSheets[si];sh.cols.splice(ci+1,0,{id:'yc'+Date.now(),l:'새 열'});sh.rows.forEach(r=>r.splice(ci+1,0,''));sdb();rTab('yarn');}},
  {l:`${colLetter(ci)}열 삭제`,fn:()=>{const s=gS(pSeas,pSid);const sh=s.yarnSheets[si];if(sh.cols.length<2){toast('최소 1개');return;}sh.cols.splice(ci,1);sh.rows.forEach(r=>r.splice(ci,1));sdb();rTab('yarn');}},
]);}
function yRC(e,si,ri){e.preventDefault();showCtx(e,[
  {l:`${ri+1}행 위에 추가`,fn:()=>{const s=gS(pSeas,pSid);const sh=s.yarnSheets[si];sh.rows.splice(ri,0,new Array(sh.cols.length).fill(''));sdb();rTab('yarn');}},
  {l:`${ri+1}행 아래에 추가`,fn:()=>{const s=gS(pSeas,pSid);const sh=s.yarnSheets[si];sh.rows.splice(ri+1,0,new Array(sh.cols.length).fill(''));sdb();rTab('yarn');}},
  {l:`${ri+1}행 삭제`,fn:()=>{const s=gS(pSeas,pSid);const sh=s.yarnSheets[si];if(sh.rows.length<2){toast('최소 1개');return;}sh.rows.splice(ri,1);sdb();rTab('yarn');}},
]);}
function addYSPhoto(si,e){const s=gS(pSeas,pSid);Array.from(e.target.files).forEach(f=>{const r=new FileReader();r.onload=ev=>{(s.yarnSheets[si].photos=s.yarnSheets[si].photos||[]).push(ev.target.result);sdb();rTab('yarn');};r.readAsDataURL(f);});}
function rmYSPhoto(si,pi){const s=gS(pSeas,pSid);s.yarnSheets[si].photos.splice(pi,1);sdb();rTab('yarn');}

function openQCM(){const s=gS(pSeas,pSid);qcN=Math.max(s.qc?.length||0,4);document.getElementById('qcmt').textContent=(s.style||'')+' — QC 및 수정사항';rQCR();om('qcm');}
function rQCR(){
  const s=gS(pSeas,pSid);s.qc=s.qc||[];
  while(s.qc.length<qcN)s.qc.push({t:'',c:'',p:[]});
  document.getElementById('qcmb').innerHTML=s.qc.slice(0,qcN).map((q,i)=>`
    <div class="qcbl"><div class="qcbh" onclick="tQCB(${i})"><span class="qcbt">${i+1}차 QC 코멘트</span><span class="badge bq" style="font-size:10px">${q.p?.length||0}장</span><span style="color:var(--t2);font-size:12px;margin-left:auto">▾</span></div>
    <div class="qcbb ${i===0?'open':''}" id="qcbb${i}">
      <div class="qcpg" id="qcpg${i}">
        ${(q.p||[]).map((src,pi)=>`<div class="qcpc" style="position:relative"><img src="${src}"><button class="pdel" onclick="rmQCP(${i},${pi})">✕</button></div>`).join('')}
        <div class="qcpc" onclick="document.getElementById('qcfi${i}').click()">+ 사진</div>
      </div>
      <input type="file" id="qcfi${i}" accept="image/*" multiple style="display:none" onchange="addQCP(${i},event)">
      <textarea id="qcct${i}" rows="3" placeholder="코멘트..." style="width:100%;background:var(--bg2);border:1px solid var(--b);border-radius:6px;padding:8px 10px;color:var(--t0);resize:vertical">${q.c||''}</textarea>
    </div></div>`).join('');
}
function tQCB(i){document.getElementById('qcbb'+i).classList.toggle('open');}
function addQCR(){qcN++;rQCR();}
function addQCP(round,e){
  const s=gS(pSeas,pSid);s.qc=s.qc||[];while(s.qc.length<=round)s.qc.push({t:'',c:'',p:[]});
  Array.from(e.target.files).forEach(f=>{const r=new FileReader();r.onload=ev=>{(s.qc[round].p=s.qc[round].p||[]).push(ev.target.result);sdb();rQCR();};r.readAsDataURL(f);});
}
function rmQCP(round,pi){const s=gS(pSeas,pSid);s.qc[round].p.splice(pi,1);sdb();rQCR();}
function saveQC(){
  const s=gS(pSeas,pSid);s.qc=s.qc||[];while(s.qc.length<qcN)s.qc.push({t:'',c:'',p:[]});
  for(let i=0;i<qcN;i++){const el=document.getElementById('qcct'+i);if(el&&s.qc[i])s.qc[i].c=el.value;}
  sdb();cm('qcm');rTab('qct');toast('QC 저장됨');
}

function addMgr(){

  _syncMgrInputs();

  setTimeout(()=>{

  },50);

function delMgr(i){
  if(!confirm('삭제?'))return;
  _syncMgrInputs();
  DB.managers.splice(i,1);
  openMgr();
}
function _syncMgrInputs(){
  // 현재 화면의 input값을 DB.managers에 반영
  const inputs=document.querySelectorAll('.mgr-inp');
  inputs.forEach(el=>{
    const i=+el.dataset.i;
    if(i>=0&&i<DB.managers.length) DB.managers[i]=el.value.trim()||DB.managers[i];
  });
}
function saveMgr(){
  _syncMgrInputs();
  DB.managers=DB.managers.filter(Boolean);
  sdb();
  cm('mgrm');
  toast('저장됨');
}

// ══════════════════════════
// PANEL RESIZE
// ══════════════════════════
(function(){
  let isResizing=false,startX=0,startW=0;
  const handle=document.getElementById('panel-resize');
  if(!handle)return;
  handle.addEventListener('mousedown',e=>{
    const panel=document.getElementById('panel');
    isResizing=true;startX=e.clientX;startW=panel.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.userSelect='none';
    document.body.style.cursor='col-resize';
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!isResizing)return;
    const panel=document.getElementById('panel');
    const diff=startX-e.clientX;
    const newW=Math.max(340,Math.min(window.innerWidth*0.92,startW+diff));
    panel.style.width=newW+'px';
    panel.style.transition='none';
  });
  document.addEventListener('mouseup',()=>{
    if(!isResizing)return;
    isResizing=false;
    handle.classList.remove('dragging');
    document.body.style.userSelect='';
    document.body.style.cursor='';
    const panel=document.getElementById('panel');
    panel.style.transition='';
  });
})();
